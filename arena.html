<!-- arena.html (RETRO ARCADE HUD - WITH GAME OVER + PAUSE MODALS) -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/addons/p5.sound.min.js"></script>
    <script src="https://p5play.org/v3/planck.min.js"></script>
    <script src="https://p5play.org/v3/p5play.js"></script>

    <link rel="stylesheet" href="./src/css/arena.css" />
    <title>Mazy Arena</title>
  </head>

  <body>
    <!-- layout wrapper -->
    <div class="arena-shell">
      <!-- LEFT HUD -->
      <div class="hud hud-left">
        <div class="hud-content">
          <!-- Player Name -->
          <div id="p1Name" class="hud-title">PLAYER 1</div>

          <!-- Health Bar -->
          <div class="hud-bar">
            <div id="p1HpFill" class="hud-bar-fill"></div>
          </div>

          <!-- Orbs / Powerups (Player 1) -->
          <div class="hud-orb hud-orb-p1">
            <img
              class="orb-icon"
              data-orb-type="speed"
              src="./assets/orbs/inactive/speed-inactive.png"
              alt="Speed Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="damage"
              src="./assets/orbs/inactive/damage-inactive.png"
              alt="Damage Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="health"
              src="./assets/orbs/inactive/health-inactive.png"
              alt="Health Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="rapid"
              src="./assets/orbs/inactive/rapidfire-inactive.png"
              alt="Rapid Fire Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="slow"
              src="./assets/orbs/inactive/slow-inactive.png"
              alt="Slow Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="freeze"
              src="./assets/orbs/inactive/freeze-inactive.png"
              alt="Freeze Orb"
            />
          </div>

          <!-- Score Section -->
          <div class="score-section">
            <div class="score-label">Score</div>
            <div id="p1Score" class="score-value">0</div>
          </div>

          <!-- Controls Section - BIG ARCADE BUTTONS -->
          <div class="controls-section">
            <!-- Move Label -->
            <div class="control-label-text">MOVEMENT</div>
            <!-- Move Controls -->
            <div class="control-item">
              <span class="control-key">A</span>
              <span class="control-key">W</span>
              <span class="control-key">D</span>
              <span class="control-key">S</span>
            </div>

            <!-- Shoot Label -->
            <div class="control-label-text">SHOOT</div>
            <!-- Shoot Button -->
            <div class="control-item">
              <span class="control-key">SPACE</span>
            </div>
          </div>

          <!-- Tank Placeholder at Bottom - FULL WIDTH -->
          <div id="p1TankPreview" class="tank-placeholder">🎮</div>
        </div>
      </div>

      <!-- CENTER -->
      <div class="arena-center">
        <div class="top-timer">
          <button class="home-btn" id="homeBtn">||</button>
          <div id="matchTimerText">TIME REMAINING : --:--</div>
          <div style="width: 50px"></div>
        </div>

        <!-- MAIN ARENA -->
        <main id="main-box"></main>
      </div>

      <!-- RIGHT HUD -->
      <div class="hud hud-right">
        <div class="hud-content">
          <!-- Player/Bot Name -->
          <div id="p2Name" class="hud-title">PLAYER 2</div>

          <!-- Health Bar -->
          <div class="hud-bar">
            <div id="p2HpFill" class="hud-bar-fill"></div>
          </div>

          <!-- Orbs / Powerups (Player 2 or Bot) -->
          <div class="hud-orb hud-orb-p2">
            <img
              class="orb-icon"
              data-orb-type="speed"
              src="./assets/orbs/inactive/speed-inactive.png"
              alt="Speed Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="damage"
              src="./assets/orbs/inactive/damage-inactive.png"
              alt="Damage Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="health"
              src="./assets/orbs/inactive/health-inactive.png"
              alt="Health Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="rapid"
              src="./assets/orbs/inactive/rapidfire-inactive.png"
              alt="Rapid Fire Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="slow"
              src="./assets/orbs/inactive/slow-inactive.png"
              alt="Slow Orb"
            />
            <img
              class="orb-icon"
              data-orb-type="freeze"
              src="./assets/orbs/inactive/freeze-inactive.png"
              alt="Freeze Orb"
            />
          </div>

          <!-- Score Section -->
          <div class="score-section">
            <div class="score-label">Score</div>
            <div id="p2Score" class="score-value">0</div>
          </div>

          <!-- Controls Section - BIG ARCADE BUTTONS -->
          <div class="controls-section">
            <!-- Move Label -->
            <div class="control-label-text">MOVEMENT</div>
            <!-- Move Controls -->
            <div class="control-item">
              <span class="control-key">←</span>
              <span class="control-key">↑</span>
              <span class="control-key">→</span>
              <span class="control-key">↓</span>
            </div>

            <!-- Shoot Label -->
            <div class="control-label-text">SHOOT</div>
            <!-- Shoot Button -->
            <div class="control-item">
              <span class="control-key">ENTER</span>
            </div>
          </div>

          <!-- Tank Placeholder at Bottom - FULL WIDTH -->
          <div id="p2TankPreview" class="tank-placeholder">🎮</div>
        </div>
      </div>
    </div>

    <!-- ================= COUNTDOWN OVERLAY ================= -->
    <div id="countdownOverlay" class="countdown-overlay" style="display: none">
      <div id="countdownText" class="countdown-text">3</div>
    </div>

    <!-- ================= GAME OVER MODAL ================= -->
    <div id="gameOverModal" class="game-over-modal" style="display: none">
      <div class="game-over-container">
        <!-- Title -->
        <div class="game-over-title">GAME OVER</div>

        <!-- Winner Section -->
        <div class="winner-section">
          <div id="winnerMessage" class="winner-message">PLAYER 1 WINS</div>
        </div>

        <!-- Final Score Section -->
        <div class="final-score-section">
          <div class="final-score-label">FINAL SCORE</div>
          <div class="score-comparison">
            <div class="score-row">
              <span id="scoreP1Name" class="score-name">PLAYER 1</span>
              <span id="scoreP1Value" class="score-number">0</span>
            </div>
            <div class="score-divider"></div>
            <div class="score-row">
              <span id="scoreP2Name" class="score-name">PLAYER 2</span>
              <span id="scoreP2Value" class="score-number">0</span>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="game-over-buttons">
          <button id="rematchBtn" class="game-over-btn rematch-btn">
            <span class="btn-key">R</span> REMATCH
          </button>
          <button id="menuBtn" class="game-over-btn menu-btn">
            <span class="btn-key">ESC</span> MENU
          </button>
        </div>

        <!-- Keyboard Hint -->
        <div class="keyboard-hint">
          Press R for Rematch or ESC for Main Menu
        </div>
      </div>
    </div>

    <!-- ================= ROUND WINNER BANNER ================= -->
    <div
      id="roundWinnerBanner"
      class="round-winner-banner"
      style="display: none"
    >
      <div class="banner-content">
        <div id="roundWinnerText" class="banner-text">
          PLAYER 2 WINS THIS ROUND
        </div>
      </div>
    </div>

    <!-- ================= PAUSE MENU ================= -->
    <div id="pauseModal" class="pause-modal" style="display: none">
      <div class="pause-container">
        <div class="pause-title">GAME PAUSED</div>

        <div class="pause-menu">
          <button id="pauseContinueBtn" class="pause-btn">CONTINUE</button>
          <button id="pauseOptionsBtn" class="pause-btn">OPTIONS</button>
          <button id="pauseTutorialBtn" class="pause-btn">TUTORIAL</button>
          <button id="pauseMainMenuBtn" class="pause-btn">MAIN MENU</button>
        </div>

        <div class="pause-hint">Press ESC to Resume</div>
      </div>
    </div>

    <script>
      // Global object to receive actions from main.js
      window.gameOverActions = {};

      document.addEventListener("DOMContentLoaded", () => {
        // Fade-in overlay for arena
        requestAnimationFrame(() => {
          document.body.classList.add("is-fading-in");
        });

        const homeBtn = document.getElementById("homeBtn");
        const pauseModal = document.getElementById("pauseModal");
        const pauseContinueBtn = document.getElementById("pauseContinueBtn");
        const pauseMainMenuBtn = document.getElementById("pauseMainMenuBtn");
        const pauseOptionsBtn = document.getElementById("pauseOptionsBtn");
        const pauseTutorialBtn = document.getElementById("pauseTutorialBtn");

        // --- PAUSE MENU HELPERS (HTML side) ---
        function showPauseModal() {
          if (pauseModal) pauseModal.style.display = "flex";
        }

        function hidePauseModal() {
          if (pauseModal) pauseModal.style.display = "none";
        }

        // Home button opens pause menu instead of going straight home
        if (homeBtn) {
          homeBtn.addEventListener("click", () => {
            window.__mazyTogglePause?.(true);
          });
        }

        // Continue button
        if (pauseContinueBtn) {
          pauseContinueBtn.addEventListener("click", () => {
            window.__mazyTogglePause?.(false);
          });
        }

        // Main menu button from pause
        if (pauseMainMenuBtn) {
          pauseMainMenuBtn.addEventListener("click", () => {
            window.__mazyPauseGoToMenu?.();
          });
        }

        // Options: placeholder for now
        if (pauseOptionsBtn) {
          pauseOptionsBtn.addEventListener("click", () => {
            alert("Options are only available from the main menu for now.");
          });
        }

        // Tutorial: placeholder for now
        if (pauseTutorialBtn) {
          pauseTutorialBtn.addEventListener("click", () => {
            alert("Tutorial is only available from the main menu for now.");
          });
        }

        // Expose minimal DOM pause APIs so main.js can control visibility
        window.__mazyPauseUI = {
          show: showPauseModal,
          hide: hidePauseModal,
        };

        // Game Over Button Handlers
        document.getElementById("rematchBtn").addEventListener("click", () => {
          window.gameOverActions?.rematch?.();
        });

        document.getElementById("menuBtn").addEventListener("click", () => {
          window.gameOverActions?.menu?.();
        });
      });
    </script>

    <div class="page-fade" aria-hidden="true"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
